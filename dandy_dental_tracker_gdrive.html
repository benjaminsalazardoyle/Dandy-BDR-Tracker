
<style>
*{box-sizing:border-box;margin:0;padding:0;}
.app{padding:1rem 0;}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;}
.topbar-left h1{font-size:16px;font-weight:500;color:var(--color-text-primary);}
.topbar-left p{font-size:12px;color:var(--color-text-secondary);margin-top:1px;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.sync-status{font-size:11px;color:var(--color-text-secondary);display:flex;align-items:center;gap:4px;}
.tbtn{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-primary);cursor:pointer;font-size:12px;font-weight:500;}
.tbtn:hover{background:var(--color-background-secondary);}
.cols{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;align-items:start;}
.col{background:var(--color-background-secondary);border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);padding:10px;}
.col-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding-bottom:8px;border-bottom:0.5px solid var(--color-border-tertiary);}
.col-title{font-size:13px;font-weight:500;color:var(--color-text-primary);}
.col-abbr{font-size:10px;color:var(--color-text-secondary);background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:20px;padding:1px 6px;}
.col-add{background:transparent;border:none;color:var(--color-text-secondary);cursor:pointer;font-size:18px;line-height:1;padding:0 2px;}
.col-add:hover{color:var(--color-text-primary);}
.accts{display:flex;flex-direction:column;gap:6px;min-height:40px;}
.acard{padding:8px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);cursor:pointer;}
.acard:hover{border-color:var(--color-border-secondary);}
.acard-top{display:flex;align-items:center;gap:6px;margin-bottom:3px;}
.rdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.r-green{background:#639922;} .r-yellow{background:#BA7517;} .r-orange{background:#D85A30;} .r-red{background:#E24B4A;}
.aname{font-size:12px;font-weight:500;color:var(--color-text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;}
.acontact{font-size:11px;color:var(--color-text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.atags{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap;}
.atag{font-size:10px;padding:1px 6px;border-radius:20px;font-weight:500;}
.tag-meeting{background:#EAF3DE;color:#3B6D11;}
.tag-calls{background:var(--color-background-secondary);color:var(--color-text-secondary);border:0.5px solid var(--color-border-tertiary);}
.empty{font-size:11px;color:var(--color-text-secondary);text-align:center;padding:12px 0;}

/* overlay pattern for modals */
.ov{display:none;position:absolute;top:0;left:0;right:0;min-height:100%;background:rgba(0,0,0,0.35);z-index:50;align-items:flex-start;justify-content:center;padding:32px 16px;}
.ov.open{display:flex;}
.modal{background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-lg);width:100%;max-width:480px;padding:1.25rem;}
.mhead{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1rem;}
.mtitle{font-size:15px;font-weight:500;color:var(--color-text-primary);}
.msub{font-size:11px;color:var(--color-text-secondary);margin-top:2px;}
.xbtn{background:transparent;border:none;color:var(--color-text-secondary);cursor:pointer;font-size:18px;line-height:1;}
.sec-lbl{font-size:11px;font-weight:500;color:var(--color-text-secondary);letter-spacing:0.04em;text-transform:uppercase;margin:12px 0 6px;}
.rating-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px;}
.rbtn{padding:4px 12px;border-radius:20px;border:0.5px solid var(--color-border-secondary);background:transparent;cursor:pointer;font-size:12px;}
.rbtn.ag{background:#EAF3DE;color:#3B6D11;border-color:#97C459;}
.rbtn.ay{background:#FAEEDA;color:#854F0B;border-color:#FAC775;}
.rbtn.ao{background:#FAECE7;color:#993C1D;border-color:#F09975;}
.rbtn.ar{background:#FCEBEB;color:#A32D2D;border-color:#F09595;}
.log-item{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:9px 10px;background:var(--color-background-secondary);margin-bottom:6px;}
.log-row1{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;}
.log-date{font-size:12px;font-weight:500;color:var(--color-text-primary);}
.log-time{font-size:11px;color:var(--color-text-secondary);}
.log-notes{font-size:12px;color:var(--color-text-secondary);line-height:1.5;}
.log-fu{font-size:11px;color:#185FA5;margin-top:4px;display:flex;align-items:center;gap:3px;}
.log-nxt{font-size:11px;color:var(--color-text-secondary);margin-top:3px;}
.log-mtg{font-size:11px;color:#3B6D11;font-weight:500;margin-top:3px;}
.add-log-btn{width:100%;padding:7px;border-radius:var(--border-radius-md);border:0.5px dashed var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;gap:5px;margin-top:4px;}
.add-log-btn:hover{background:var(--color-background-secondary);}
.lform{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:10px;background:var(--color-background-secondary);margin-top:8px;}
.frow2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.flbl{font-size:11px;color:var(--color-text-secondary);display:block;margin-bottom:3px;}
.lform input,.lform textarea,.lform select{font-size:12px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);padding:5px 8px;background:var(--color-background-primary);color:var(--color-text-primary);width:100%;}
.lform textarea{resize:vertical;min-height:56px;font-family:var(--font-sans);}
.mtg-row{display:flex;align-items:center;gap:6px;margin:6px 0;}
.mtg-row label{font-size:12px;color:var(--color-text-secondary);}
.save-btn{padding:5px 14px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer;font-size:12px;font-weight:500;margin-top:6px;}
.save-btn:hover{background:var(--color-background-secondary);}
.ig{margin-bottom:9px;}
.ig label{font-size:12px;color:var(--color-text-secondary);display:block;margin-bottom:3px;}
.ig input,.ig select{width:100%;font-size:13px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);padding:6px 9px;background:var(--color-background-primary);color:var(--color-text-primary);}
.mfoot{display:flex;justify-content:flex-end;gap:8px;margin-top:1rem;}
.bcnl{padding:6px 14px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);cursor:pointer;font-size:12px;}
.bsav{padding:6px 14px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer;font-size:12px;font-weight:500;}
.bsav:hover{background:var(--color-background-secondary);}
</style>

<div style="position:relative;" id="root">
<h2 class="sr-only">Dandy Dental Lab BDR follow-up tracker with four time zone columns and Google Drive persistence</h2>

<div class="app">
  <div class="topbar">
    <div class="topbar-left">
      <h1>Follow-up tracker — Dandy Dental Lab</h1>
      <p>BDR pipeline by time zone</p>
    </div>
    <div class="topbar-right">
      <span class="sync-status" id="sync-status"><i class="ti ti-cloud" aria-hidden="true" style="font-size:14px;"></i> <span id="sync-txt">Loading...</span></span>
      <button class="tbtn" onclick="saveToDrive()"><i class="ti ti-upload" aria-hidden="true" style="font-size:14px;"></i> Save</button>
      <button class="tbtn" onclick="openAdd(null)"><i class="ti ti-plus" aria-hidden="true" style="font-size:14px;"></i> Add account</button>
    </div>
  </div>
  <div class="cols" id="cols"></div>
</div>

<!-- Detail modal -->
<div class="ov" id="det-ov">
  <div class="modal">
    <div class="mhead">
      <div><div class="mtitle" id="det-name"></div><div class="msub" id="det-contact"></div></div>
      <button class="xbtn" onclick="closeDet()"><i class="ti ti-x" aria-hidden="true"></i></button>
    </div>
    <div class="sec-lbl">Conversion rating</div>
    <div class="rating-row">
      <button class="rbtn" id="rb-green" onclick="setRating('green')">Green</button>
      <button class="rbtn" id="rb-yellow" onclick="setRating('yellow')">Yellow</button>
      <button class="rbtn" id="rb-orange" onclick="setRating('orange')">Orange</button>
      <button class="rbtn" id="rb-red" onclick="setRating('red')">Red</button>
    </div>
    <div class="sec-lbl">Call log</div>
    <div id="log-list"></div>
    <button class="add-log-btn" onclick="toggleLogForm()"><i class="ti ti-plus" aria-hidden="true"></i> Log a call</button>
    <div class="lform" id="lform" style="display:none;">
      <div class="frow2">
        <div><label class="flbl">Date</label><input type="date" id="ld"></div>
        <div><label class="flbl">Time</label><input type="time" id="lt"></div>
      </div>
      <div style="margin-bottom:7px;"><label class="flbl">Call notes</label><textarea id="ln" placeholder="What was discussed..."></textarea></div>
      <div style="margin-bottom:7px;"><label class="flbl">Follow-up action</label><input type="text" id="lf" placeholder="e.g. Send demo link, call back Friday..."></div>
      <div style="margin-bottom:7px;"><label class="flbl">Next follow-up date</label><input type="date" id="lnx"></div>
      <div class="mtg-row"><input type="checkbox" id="lm" style="width:auto;"><label for="lm">Meeting booked from this call</label></div>
      <button class="save-btn" onclick="saveLog()">Save call</button>
    </div>
  </div>
</div>

<!-- Add account modal -->
<div class="ov" id="add-ov">
  <div class="modal" style="max-width:360px;">
    <div class="mhead"><div class="mtitle">Add account</div><button class="xbtn" onclick="closeAdd()"><i class="ti ti-x" aria-hidden="true"></i></button></div>
    <div class="ig"><label>Account name (Salesforce)</label><input type="text" id="na" placeholder="e.g. Bright Smiles Dental"></div>
    <div class="ig"><label>Contact name</label><input type="text" id="nc" placeholder="e.g. Dr. Sarah Kim"></div>
    <div class="ig"><label>Time zone</label>
      <select id="ntz">
        <option value="ET">Eastern (ET)</option>
        <option value="CT">Central (CT)</option>
        <option value="MT">Mountain (MT)</option>
        <option value="PT">Pacific (PT)</option>
      </select>
    </div>
    <div class="ig"><label>Initial rating</label>
      <select id="nr">
        <option value="green">Green — high chance</option>
        <option value="yellow">Yellow — moderate</option>
        <option value="orange">Orange — low</option>
        <option value="red">Red — unlikely</option>
      </select>
    </div>
    <div class="mfoot">
      <button class="bcnl" onclick="closeAdd()">Cancel</button>
      <button class="bsav" onclick="saveNewAcct()">Add account</button>
    </div>
  </div>
</div>
</div>

<script>
const TZS=[{key:'ET',label:'Eastern',abbr:'ET'},{key:'CT',label:'Central',abbr:'CT'},{key:'MT',label:'Mountain',abbr:'MT'},{key:'PT',label:'Pacific',abbr:'PT'}];
const DRIVE_FILE='dandy_bdr_tracker.json';
let accounts=[];
let nextId=1;
let currentAcct=null;
let driveFileId=null;
let saving=false;

function fmtDate(d){if(!d)return'';const[y,m,day]=d.split('-');const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return`${mo[parseInt(m)-1]} ${parseInt(day)}`;}

function setSyncStatus(msg,icon='ti-cloud'){document.getElementById('sync-txt').textContent=msg;document.querySelector('#sync-status i').className=`ti ${icon}`;}

async function callAPI(body){
  const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,...body,mcp_servers:[{type:'url',url:'https://drivemcp.googleapis.com/mcp/v1',name:'gdrive'}]})});
  return r.json();
}

async function loadFromDrive(){
  setSyncStatus('Connecting...','ti-loader');
  try{
    const data=await callAPI({messages:[{role:'user',content:`Search Google Drive for a file named exactly "${DRIVE_FILE}". If found, return its file ID and full text content as JSON: {"fileId":"...","content":"..."}. If not found return {"fileId":null,"content":null}. Return ONLY valid JSON, no other text.`}]});
    const txt=data.content.filter(b=>b.type==='text').map(b=>b.text).join('');
    const clean=txt.replace(/```json|```/g,'').trim();
    const parsed=JSON.parse(clean);
    if(parsed.fileId&&parsed.content){
      driveFileId=parsed.fileId;
      const state=JSON.parse(parsed.content);
      accounts=state.accounts||[];
      nextId=state.nextId||accounts.length+1;
      setSyncStatus('Loaded from Drive','ti-cloud-check');
    } else {
      setSyncStatus('New file — save to sync','ti-cloud-upload');
    }
  } catch(e){
    setSyncStatus('Drive unavailable','ti-cloud-off');
  }
  renderCols();
}

async function saveToDrive(){
  if(saving)return;
  saving=true;
  setSyncStatus('Saving...','ti-loader');
  const content=JSON.stringify({accounts,nextId});
  try{
    let prompt;
    if(driveFileId){
      prompt=`Update the Google Drive file with ID "${driveFileId}" with this exact content (overwrite completely): ${content}. Confirm with JSON {"ok":true}.`;
    } else {
      prompt=`Create a new Google Drive file named "${DRIVE_FILE}" with this exact text content: ${content}. Return JSON {"ok":true,"fileId":"<the new file id>"}.`;
    }
    const data=await callAPI({messages:[{role:'user',content:prompt}]});
    const txt=data.content.filter(b=>b.type==='text').map(b=>b.text).join('');
    const clean=txt.replace(/```json|```/g,'').trim();
    const parsed=JSON.parse(clean);
    if(!driveFileId&&parsed.fileId)driveFileId=parsed.fileId;
    setSyncStatus('Saved to Drive','ti-cloud-check');
  } catch(e){
    setSyncStatus('Save failed — retry','ti-cloud-off');
  }
  saving=false;
}

function renderCols(){
  const g=document.getElementById('cols');
  g.innerHTML='';
  TZS.forEach(tz=>{
    const accts=accounts.filter(a=>a.tz===tz.key);
    const col=document.createElement('div');
    col.className='col';
    col.innerHTML=`<div class="col-head"><div style="display:flex;align-items:center;gap:6px;"><span class="col-title">${tz.label}</span><span class="col-abbr">${tz.abbr}</span></div><button class="col-add" onclick="openAdd('${tz.key}')" aria-label="Add account to ${tz.label}"><i class="ti ti-plus" aria-hidden="true" style="font-size:16px;"></i></button></div><div class="accts">${accts.length===0?'<div class="empty">No accounts</div>':accts.map(acctHTML).join('')}</div>`;
    g.appendChild(col);
  });
}

function acctHTML(a){
  const mtg=a.meetingBooked||a.logs.some(l=>l.meetingBooked);
  return`<div class="acard" onclick="openDet(${a.id})"><div class="acard-top"><div class="rdot r-${a.rating}"></div><div class="aname">${a.name}</div></div><div class="acontact">${a.contact}</div><div class="atags">${mtg?'<span class="atag tag-meeting">Meeting booked</span>':''}${a.logs.length>0?`<span class="atag tag-calls">${a.logs.length} call${a.logs.length!==1?'s':''}</span>`:''}</div></div>`;
}

function openDet(id){
  currentAcct=accounts.find(a=>a.id===id);
  document.getElementById('det-name').textContent=currentAcct.name;
  document.getElementById('det-contact').textContent=currentAcct.contact;
  renderRatingBtns();renderLogs();
  document.getElementById('lform').style.display='none';
  document.getElementById('det-ov').classList.add('open');
}

function closeDet(){document.getElementById('det-ov').classList.remove('open');renderCols();}

function renderRatingBtns(){
  ['green','yellow','orange','red'].forEach(r=>{
    const b=document.getElementById('rb-'+r);
    b.className='rbtn'+(currentAcct.rating===r?' a'+r[0]:'');
  });
}

function setRating(r){currentAcct.rating=r;renderRatingBtns();}

function renderLogs(){
  const el=document.getElementById('log-list');
  if(!currentAcct.logs.length){el.innerHTML='<div style="font-size:12px;color:var(--color-text-secondary);padding:6px 0;">No calls logged yet.</div>';return;}
  el.innerHTML=currentAcct.logs.map(l=>`<div class="log-item"><div class="log-row1"><span class="log-date">${fmtDate(l.date)}</span><span class="log-time">${l.time||''}</span></div>${l.notes?`<div class="log-notes">${l.notes}</div>`:''} ${l.followup?`<div class="log-fu"><i class="ti ti-arrow-right" aria-hidden="true" style="font-size:11px;"></i> ${l.followup}</div>`:''} ${l.next?`<div class="log-nxt"><i class="ti ti-calendar" aria-hidden="true" style="font-size:11px;"></i> Next: ${fmtDate(l.next)}</div>`:''} ${l.meetingBooked?'<div class="log-mtg">Meeting booked</div>':''}</div>`).join('');
}

function toggleLogForm(){const f=document.getElementById('lform');f.style.display=f.style.display==='none'?'block':'none';if(f.style.display==='block'){document.getElementById('ld').value=new Date().toISOString().split('T')[0];}}

function saveLog(){
  currentAcct.logs.unshift({date:document.getElementById('ld').value,time:document.getElementById('lt').value,notes:document.getElementById('ln').value,followup:document.getElementById('lf').value,next:document.getElementById('lnx').value,meetingBooked:document.getElementById('lm').checked});
  if(document.getElementById('lm').checked)currentAcct.meetingBooked=true;
  ['ln','lf','lnx','lt'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('lm').checked=false;
  document.getElementById('lform').style.display='none';
  renderLogs();
}

function openAdd(tz){if(tz)document.getElementById('ntz').value=tz;document.getElementById('add-ov').classList.add('open');}
function closeAdd(){document.getElementById('add-ov').classList.remove('open');}

function saveNewAcct(){
  const name=document.getElementById('na').value.trim();
  if(!name)return;
  accounts.push({id:nextId++,name,contact:document.getElementById('nc').value.trim(),tz:document.getElementById('ntz').value,rating:document.getElementById('nr').value,meetingBooked:false,logs:[]});
  document.getElementById('na').value='';document.getElementById('nc').value='';
  closeAdd();renderCols();
}

document.getElementById('det-ov').addEventListener('click',function(e){if(e.target===this)closeDet();});
document.getElementById('add-ov').addEventListener('click',function(e){if(e.target===this)closeAdd();});

loadFromDrive();
</script>
